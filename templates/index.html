<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-title">⚡ Pokédex Tracker</div>
    <div class="header-stats">
      <span class="stat"><span class="stat-value" id="stat-total">0</span> cartas</span>
      <span class="stat">Wishlist: <span class="stat-value" id="stat-wishlist">€0</span></span>
      <span class="stat">Colección: <span class="stat-value" id="stat-owned">€0</span></span>
      <span class="stat last-update" id="stat-updated">–</span>
    </div>
    <button class="btn-refresh" id="btn-dashboard" onclick="openDashboard()">
      <span>📊</span> Dashboard
    </button>
    <button class="btn-refresh" id="btn-plan" onclick="openPlanModal()">
      <span>📅</span> Planning
    </button>
    <button class="btn-refresh" id="btn-seed" onclick="triggerSeed()">
      <span id="seed-icon">✨</span> Rellenar wishlist
    </button>
    <button class="btn-refresh" id="btn-refresh" onclick="triggerRefresh()">
      <span id="refresh-icon">↻</span> Actualizar precios
    </button>
  </header>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-tabs">
      <button class="tab active" onclick="setTab(this, 'all')">Todos</button>
      <button class="tab" onclick="setTab(this, 'wishlist')">Wishlist</button>
      <button class="tab" onclick="setTab(this, 'owned')">Colección</button>
    </div>
    <div class="filter-gens">
      <button class="gen-btn active" onclick="setGen(this, null)">Todas</button>
      <button class="gen-btn" onclick="setGen(this, 1)">Gen 1</button>
      <button class="gen-btn" onclick="setGen(this, 2)">Gen 2</button>
      <button class="gen-btn" onclick="setGen(this, 3)">Gen 3</button>
      <button class="gen-btn" onclick="setGen(this, 4)">Gen 4</button>
      <button class="gen-btn" onclick="setGen(this, 5)">Gen 5</button>
      <button class="gen-btn" onclick="setGen(this, 6)">Gen 6</button>
      <button class="gen-btn" onclick="setGen(this, 7)">Gen 7</button>
      <button class="gen-btn" onclick="setGen(this, 8)">Gen 8</button>
      <button class="gen-btn" onclick="setGen(this, 9)">Gen 9</button>
      <button class="gen-btn" onclick="setGen(this, 0)">Special</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" onclick="setGroupBy(this, true)">Por Pokémon</button>
      <button class="view-btn" onclick="setGroupBy(this, false)">Global</button>
    </div>
    <select class="sort-select" id="sort-select" onchange="setSort(this.value)">
      <option value="price-desc">Precio ↓ (más caras)</option>
      <option value="price-asc">Precio ↑ (más baratas)</option>
      <option value="rarity">Rareza</option>
      <option value="name">Nombre</option>
    </select>
    <input class="search-input" id="search-input" placeholder="Buscar Pokemon..." oninput="renderGrid()">
  </div>

  <!-- MAIN GRID -->
  <main id="grid"></main>

  <!-- ADD CARD MODAL -->
  <div class="modal-overlay" id="modal-add" style="display:none" onclick="closeAddModal(event)">
    <div class="modal">
      <h2>Añadir carta</h2>
      <div class="modal-search">
        <input class="modal-input" id="add-search-input" placeholder="Nombre del Pokemon...">
        <button class="btn-primary" onclick="searchCards()">Buscar</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- CARD DETAIL MODAL -->
  <div class="modal-overlay" id="modal-detail" style="display:none" onclick="closeDetailModal(event)">
    <div class="modal modal-detail-inner">
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- MONTHLY PLAN MODAL -->
  <div class="modal-overlay" id="modal-plan" style="display:none" onclick="closePlanModal(event)">
    <div class="modal modal-plan-inner">
      <div class="plan-header">
        <h2>📅 Planning anual</h2>
        <div class="plan-year-nav">
          <button class="btn-secondary plan-year-btn" onclick="changePlanYear(-1)">‹</button>
          <span id="plan-year-label">2026</span>
          <button class="btn-secondary plan-year-btn" onclick="changePlanYear(1)">›</button>
        </div>
      </div>
      <div class="plan-summary" id="plan-summary"></div>
      <div class="plan-advice" id="plan-advice"></div>
      <div id="plan-months"></div>
    </div>
  </div>

  <!-- DASHBOARD MODAL -->
  <div class="modal-overlay" id="modal-dashboard" style="display:none" onclick="closeDashboard(event)">
    <div class="modal modal-dashboard-inner">
      <div class="dash-header">
        <h2>📊 Dashboard de inversión</h2>
        <div class="dash-export">
          <a class="btn-secondary" href="/api/export/xlsx">⬇ Excel</a>
          <a class="btn-secondary" href="/api/export/pdf">⬇ PDF</a>
        </div>
      </div>
      <div class="dash-kpis" id="dash-kpis"></div>
      <div class="dash-charts">
        <div class="dash-chart-box dash-chart-wide">
          <div class="dash-chart-title">Valor de la colección en el tiempo</div>
          <canvas id="chart-value"></canvas>
        </div>
        <div class="dash-chart-box">
          <div class="dash-chart-title">Valor por generación</div>
          <canvas id="chart-gen"></canvas>
        </div>
        <div class="dash-chart-box">
          <div class="dash-chart-title">Cartas por rareza</div>
          <canvas id="chart-rarity"></canvas>
        </div>
      </div>
      <div class="dash-movers" id="dash-movers"></div>
    </div>
  </div>

  <!-- IMAGE LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox" style="display:none" onclick="closeLightbox()">
    <img id="lightbox-img" class="lightbox-img" src="" alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
